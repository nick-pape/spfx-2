# Pipeline: Bump Versions
# Trigger: Automatically when changes merge to main that include change files.
# Purpose: Bump versions, build, pack, create/update GitHub PR.

trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    include:
      - 'common/changes/*'
      - 'common/config/rush/version-policies.json'

pr: none

variables:
  - name: FORCE_COLOR
    value: 1
  - name: FeatureBranch
    value: 'user/spfx-cli-bot/bump-versions'

resources:
  repositories:
    - repository: 1esPipelines
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      os: windows
    stages:
      - stage: BumpVersions
        displayName: 'Bump Versions and Create PR'
        jobs:
          - job: BumpVersions
            displayName: 'Bump Versions'
            pool:
              name: publish-rushstack
              os: linux
            templateContext:
              outputParentDirectory: $(Build.ArtifactStagingDirectory)
              outputs:
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/packages
                  artifactName: packages
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/artifact-metadata.json
                  artifactName: metadata
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/package-versions
                  artifactName: package-versions
            steps:
              - checkout: self
                persistCredentials: true

              - template: /common/config/azure-pipelines/templates/configure-git-user.yaml@self

              - bash: |
                  git checkout -b $(FeatureBranch)
                  echo "Created feature branch: $(FeatureBranch)"
                displayName: 'Create Feature Branch'

              - template: /common/config/azure-pipelines/templates/install-node.yaml@self

              - template: /common/config/azure-pipelines/templates/install-run-rush.yaml@self
                parameters:
                  Arguments: 'install'
                  DisplayName: 'Rush Install'

              - template: /common/config/azure-pipelines/templates/bump-versions.yaml@self
                parameters:
                  VersionPolicyName: spfx

              - template: /common/config/azure-pipelines/templates/install-run-rush.yaml@self
                parameters:
                  Arguments: >
                    test-and-package-solution
                    --production
                    --timeline
                    --verbose
                  DisplayName: 'Rush Rebuild'

              - template: /common/config/azure-pipelines/templates/pack.yaml@self

              # Check for changes and commit
              - bash: |
                  git add -u
                  git add -- '**/CHANGELOG.md' '**/CHANGELOG.json'

                  if [ -n "$(git diff --cached --numstat)" ]; then
                    git commit -m "Applying package version bumps

                  Pipeline Run: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)
                  Run ID: $(Build.BuildId)"
                    echo "Changes committed"
                    echo "##vso[task.setvariable variable=HasChanges]true"
                  else
                    echo "No changes to commit"
                    echo "##vso[task.setvariable variable=HasChanges]false"
                  fi
                displayName: 'Commit Version Bumps'

              # Push to remote
              - bash: |
                  git config push.default simple
                  git push -f -u origin $(FeatureBranch)
                  echo "Pushed to $(FeatureBranch)"
                displayName: 'Push Feature Branch'
                condition: and(succeeded(), eq(variables['HasChanges'], 'true'))

              # Ensure artifact directories exist unconditionally. The 1ES
              # templateContext.outputs always attempts to publish declared
              # artifacts, so the directories must be present even when earlier
              # steps fail.
              - bash: |
                  mkdir -p "$(Build.ArtifactStagingDirectory)/packages"
                  mkdir -p "$(Build.ArtifactStagingDirectory)/package-versions"
                displayName: 'Create artifact staging directories'

              - template: /common/config/azure-pipelines/templates/prepare-publish-artifacts.yaml@self

              - template: /common/config/azure-pipelines/templates/record-versions.yaml@self

              - template: /common/config/azure-pipelines/templates/create-update-pr.yaml@self
                parameters:
                  BranchName: $(FeatureBranch)
                  BaseBranch: $(Build.SourceBranchName)
                  Title: 'Bump package versions'
                  Body: |
                    Automated version bump generated by Azure DevOps Pipeline.

                    This PR contains version bumps for the "spfx" lockstep version policy.

                    **Pipeline Run:** $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)

              # Tag this pipeline run with the version bump commit SHA so the
              # publish pipeline can find this exact run via the AzDO Build API.
              - bash: |
                  BUMP_SHA=$(git rev-parse HEAD)
                  BUMP_TAG="spfx-version-bump-sha-$BUMP_SHA"
                  echo "Tagging build with bump commit tag: $BUMP_TAG"
                  echo "##vso[build.addbuildtag]$BUMP_TAG"
                displayName: 'Tag build with bump commit SHA'
                condition: and(succeeded(), eq(variables['HasChanges'], 'true'))
