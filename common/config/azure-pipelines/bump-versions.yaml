# Pipeline: Bump Versions
# Trigger: Automatically when changes merge to main that include change files or pipeline YAML.
# Purpose: Bump versions, build, pack, create/update GitHub PR.

trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    include:
      - 'common/changes/*'
      - 'common/config/rush/version-policies.json'
      - 'common/config/azure-pipelines/**'

pr: none

variables:
  - name: FORCE_COLOR
    value: 1
  - name: FeatureBranch
    value: 'user/spfx-cli-bot/bump-versions'
  - name: BaseBranch
    value: $[ replace(variables['Build.SourceBranch'], 'refs/heads/', '') ]

resources:
  repositories:
    - repository: 1esPipelines
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      os: windows
    stages:
      - stage: BumpVersions
        displayName: 'Bump Versions and Create PR'
        jobs:
          - job: BumpVersions
            displayName: 'Bump Versions'
            pool:
              name: publish-rushstack
              os: linux
            templateContext:
              outputParentDirectory: $(Build.ArtifactStagingDirectory)
              outputs:
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/packages
                  artifactName: packages
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/artifact-metadata.json
                  artifactName: metadata
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/package-versions
                  artifactName: package-versions
            steps:
              - checkout: self
                persistCredentials: true

              - template: /common/config/azure-pipelines/templates/configure-git-user.yaml@self

              - bash: |
                  git checkout -b $(FeatureBranch)
                  echo "Created feature branch: $(FeatureBranch)"
                displayName: 'Create Feature Branch'

              - template: /common/config/azure-pipelines/templates/install-node.yaml@self

              - template: /common/config/azure-pipelines/templates/install-run-rush.yaml@self
                parameters:
                  Arguments: 'install'
                  DisplayName: 'Rush Install'

              - template: /common/config/azure-pipelines/templates/bump-versions.yaml@self
                parameters:
                  VersionPolicyName: spfx

              - template: /common/config/azure-pipelines/templates/install-run-rush.yaml@self
                parameters:
                  Arguments: >
                    test-and-package-solution
                    --production
                    --timeline
                    --verbose
                  DisplayName: 'Rush Rebuild'

              - template: /common/config/azure-pipelines/templates/pack.yaml@self

              # Check for changes and commit
              - bash: |
                  git add -u
                  git add -- '**/CHANGELOG.md' '**/CHANGELOG.json'

                  if [ -n "$(git diff --cached --numstat)" ]; then
                    git commit -m "Applying package version bumps

                  Pipeline Run: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)
                  Run ID: $(Build.BuildId)"
                    echo "Changes committed"
                    echo "##vso[task.setvariable variable=HasChanges]true"
                  else
                    echo "No changes to commit"
                    echo "##vso[task.setvariable variable=HasChanges]false"
                  fi
                displayName: 'Commit Version Bumps'

              # Push to remote
              - bash: |
                  git config push.default simple
                  git push -f -u origin $(FeatureBranch)
                  echo "Pushed to $(FeatureBranch)"
                displayName: 'Push Feature Branch'
                condition: and(succeeded(), eq(variables['HasChanges'], 'true'))

              # Ensure artifact directories exist unconditionally. The 1ES
              # templateContext.outputs always attempts to publish declared
              # artifacts, so the directories must be present even when earlier
              # steps fail.
              - bash: |
                  mkdir -p "$(Build.ArtifactStagingDirectory)/packages"
                  mkdir -p "$(Build.ArtifactStagingDirectory)/package-versions"
                displayName: 'Create artifact staging directories'

              - template: /common/config/azure-pipelines/templates/prepare-publish-artifacts.yaml@self

              - template: /common/config/azure-pipelines/templates/record-versions.yaml@self

              - template: /common/config/azure-pipelines/templates/run-repo-toolbox.yaml@self
                parameters:
                  Arguments: >
                    create-or-update-pr
                    --branch-name "$(FeatureBranch)"
                    --base-branch "$(BaseBranch)"
                    --status-context "bump-versions"
                  DisplayName: 'Create or update GitHub PR'
                  Name: CreateOrUpdatePr
                  Condition: and(succeeded(), ne(variables['HasChanges'], 'false'))
                  Env:
                    PR_TITLE: 'Bump package versions'
                    PR_BODY: |
                      Automated version bump generated by Azure DevOps Pipeline.

                      This PR contains version bumps for the "spfx" lockstep version policy.

                      **Pipeline Run:** $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)
                    SYSTEM_COLLECTIONURI: $(System.CollectionUri)
                    SYSTEM_TEAMPROJECT: $(System.TeamProject)
                    BUILD_BUILDID: $(Build.BuildId)

              # Tag this AzDO build with the bump commit SHA and emit GitHub
              # pipeline variables for the agentless PostGitHubStatus stage.
              - template: /common/config/azure-pipelines/templates/run-repo-toolbox.yaml@self
                parameters:
                  Arguments: emit-github-vars-and-tag-build
                  DisplayName: 'Tag build and emit GitHub pipeline variables'
                  Name: EmitGitHubVars
                  Condition: and(succeeded(), eq(variables['HasChanges'], 'true'))

      # Posts a GitHub commit status to the bump branch HEAD once both the
      # BumpVersions stage and the 1ES-injected SDLSources stage have finished.
      # Uses an agentless server job so no agent allocation is needed.
      # SDLSources runs in parallel with BumpVersions (dependsOn: []), so this
      # stage effectively waits for the entire pipeline before posting.
      - stage: PostGitHubStatus
        displayName: 'Post pipeline status to GitHub PR'
        dependsOn:
          - BumpVersions
          - SDLSources
        condition: >
          and(
            in(dependencies.BumpVersions.result, 'Succeeded', 'SucceededWithIssues'),
            in(dependencies.SDLSources.result, 'Succeeded', 'SucceededWithIssues'),
            ne(dependencies.BumpVersions.outputs['BumpVersions.EmitGitHubVars.BumpSha'], '')
          )
        jobs:
          - job: PostStatus
            displayName: 'Post success status to GitHub'
            pool: server
            variables:
              - name: BumpSha
                value: $[ stageDependencies.BumpVersions.BumpVersions.outputs['EmitGitHubVars.BumpSha'] ]
              - name: GitHubRepoSlug
                value: $[ stageDependencies.BumpVersions.BumpVersions.outputs['EmitGitHubVars.GitHubRepoSlug'] ]
              - name: GitHubToken
                value: $[ stageDependencies.BumpVersions.BumpVersions.outputs['EmitGitHubVars.GitHubToken'] ]
              - name: StatusContext
                value: $[ stageDependencies.BumpVersions.BumpVersions.outputs['CreateOrUpdatePr.StatusContext'] ]
            steps:
              - task: AzureFunction@1
                displayName: 'Post success status to GitHub'
                inputs:
                  function: 'https://api.github.com/repos/$(GitHubRepoSlug)/statuses/$(BumpSha)'
                  method: POST
                  headers: |
                    {
                      "Authorization": "$(GitHubToken)",
                      "Content-Type": "application/json",
                      "User-Agent": "AzureDevOps"
                    }
                  body: |
                    {
                      "state": "success",
                      "target_url": "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)",
                      "description": "Bump versions pipeline complete",
                      "context": "$(StatusContext)"
                    }
                  waitForCompletion: false
