# Template: Create or update a GitHub pull request
# Creates a new PR or updates an existing one for the version bump branch.
# Requires checkout with persistCredentials: true and rush install and build to have been run.

parameters:
  - name: BranchName
    type: string
  - name: BaseBranch
    type: string
    default: 'main'
  - name: Title
    type: string
  - name: Body
    type: string
    default: ''
  - name: RepoPath
    type: string
    default: '$(Build.SourcesDirectory)'

steps:
  - script: >
      node tools/repo-toolbox/lib/start.js create-or-update-pr
      --branch-name "${{ parameters.BranchName }}"
      --base-branch "${{ parameters.BaseBranch }}"
    displayName: 'Create or update GitHub PR'
    condition: and(succeeded(), ne(variables['HasChanges'], 'false'))
    workingDirectory: ${{ parameters.RepoPath }}
    env:
      PR_TITLE: ${{ parameters.Title }}
      PR_BODY: ${{ parameters.Body }}
