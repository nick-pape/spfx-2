parameters:
  - name: RepoPath
    type: string
    default: '$(Build.SourcesDirectory)'

steps:
  - script: |
      git config --local user.email "spfx-cli-bot@users.noreply.github.com"
      git config --local user.name "SPFx CLI Bot"
    displayName: 'Configure Git User'
    workingDirectory: ${{ parameters.RepoPath }}
