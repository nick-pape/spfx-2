# Template: Install Node.js
# Installs the correct Node.js version for Rush operations.

parameters:
  - name: NodeVersion
    type: string
    default: '24.14.x'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '${{ parameters.NodeVersion }}'
    displayName: 'Install Node.js ${{ parameters.NodeVersion }}'
