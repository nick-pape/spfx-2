name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `spfx create ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: Output of `spfx --version`
      placeholder: '0.1.0'
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: 'v22.14.0'
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
  - type: input
    id: template
    attributes:
      label: Template (if applicable)
      description: Which template is affected, if this is a template-related issue.
      placeholder: 'webpart-react'
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
